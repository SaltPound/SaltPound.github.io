# Staticman configuration for saltpound.github.io
# Docs: https://staticman.net/docs/configuration
#
# Read by the Staticman bot when a comment form is submitted.
# The bot creates a YAML file in _data/comments/<post-slug>/ — either directly,
# or (with moderation: true) via a pull request you approve.

comments:
  # Fields the form is allowed to submit — anything else is rejected
  allowedFields: ["name", "email", "url", "message"]

  # Required fields — the form won't submit without these
  requiredFields: ["name", "email", "message"]

  # Branch the bot commits to (must match your default branch)
  branch: "master"

  # Commit message template
  commitMessage: "New comment by {fields.name} on {options.slug}"

  # Where comment files are written (relative to repo root)
  path: "_data/comments/{options.slug}"

  # yaml is the easiest format for minimal-mistakes to render
  format: "yaml"

  # Unique filename pattern
  filename: "comment-{@timestamp}"

  # true  = opens a PR for each comment (manual approval, zero spam risk)
  # false = commits directly (instant publish, but needs good spam protection)
  moderation: true

  # Name shown in notification emails / GitHub commit messages
  name: "saltpound-blog"

  # Only accept submissions from your own domain (stops random bots abusing the endpoint)
  allowedOrigins: ["saltpound.github.io", "localhost"]

  # Auto-generated fields added by the bot
  generatedFields:
    date:
      type: "date"
      options:
        format: "iso8601" # iso8601 / timestamp-seconds / timestamp-milliseconds

  # Transforms applied to incoming fields
  transforms:
    email: md5 # hash email (used for Gravatar), raw email never leaves the bot

  # reCAPTCHA — disabled for now. Enable BEFORE going live to block spam.
  # Steps:
  #   1. Get v2 Checkbox keys at https://www.google.com/recaptcha/admin (add saltpound.github.io)
  #   2. Encrypt the secret: visit https://<your-bot-host>/v2/encrypt/<your-secret>
  #   3. Paste encrypted secret below, set enabled: true
  #   4. Also fill in reCaptcha block in _config.yml
  reCaptcha:
    enabled: false
    siteKey: "" # TODO: your reCAPTCHA v2 site key
    secret: ""  # TODO: AES-encrypted secret from the Staticman /encrypt endpoint
