<!-- start custom head snippets -->

<!-- Favicon. SVG is the source of truth (transparent, scales). For Safari/iOS
     home-screen, generate a 180×180 PNG via https://realfavicongenerator.net/
     and drop it at /assets/images/saltpound-mark-180.png. -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/saltpound-mark.svg' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/images/saltpound-mark-180.png' | relative_url }}">

<!-- MathJax 3 — renders inline \(...\) and display \[...\] / $$...$$ LaTeX
     (kramdown with math_engine: null emits \(...\) / \[...\] from $...$ source) -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Justified body text on posts/pages that opt in via `classes: justified` -->
<style>
  .page__content.justified,
  .justified p,
  .justified li {
    text-align: justify;
    text-justify: inter-word;
    hyphens: auto;
    -webkit-hyphens: auto;
    -ms-hyphens: auto;
  }
  /* Don't justify code blocks, blockquotes, headings, tables */
  .justified pre,
  .justified blockquote,
  .justified h1, .justified h2, .justified h3,
  .justified h4, .justified h5, .justified h6,
  .justified table {
    text-align: left;
    hyphens: none;
  }
</style>

<!-- end custom head snippets -->
