<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- S -->
    <linearGradient id="Sgrad" x1="120" y1="60" x2="380" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F766E"></stop>
      <stop offset="1" stop-color="#0B3B44"></stop>
    </linearGradient>

    <!-- pile (simple triangle) -->
    <linearGradient id="pileMain" x1="140" y1="340" x2="360" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#69E2FF"></stop>
      <stop offset="1" stop-color="#1D7ACB"></stop>
    </linearGradient>
    <linearGradient id="pileInner" x1="180" y1="355" x2="330" y2="485" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#CFF6FF"></stop>
      <stop offset="1" stop-color="#2FAEF8"></stop>
    </linearGradient>

    <!-- cube -->
    <linearGradient id="cubeTop" x1="345" y1="280" x2="420" y2="318" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C9FF7A"></stop>
      <stop offset="1" stop-color="#78E046"></stop>
    </linearGradient>
    <linearGradient id="cubeLeft" x1="300" y1="320" x2="360" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#26D98A"></stop>
      <stop offset="1" stop-color="#0A8A56"></stop>
    </linearGradient>
    <linearGradient id="cubeRight" x1="360" y1="320" x2="450" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FD27E"></stop>
      <stop offset="1" stop-color="#086F45"></stop>
    </linearGradient>

    <clipPath id="clipLeft">
      <path d="M268 324 L362 368 V472 L268 428 V324Z"></path>
    </clipPath>
    <clipPath id="clipRight">
      <path d="M456 324 L362 368 V472 L456 428 V324Z"></path>
    </clipPath>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.18"></feDropShadow>
    </filter>

    <style>
      .stroke { stroke:#06323A; stroke-width:14; stroke-linecap:round; stroke-linejoin:round; }
      .stroke2{ stroke:#06323A; stroke-width:10; stroke-linecap:round; stroke-linejoin:round; }
      .thin   { stroke:#06323A; stroke-width:6;  stroke-linecap:round; stroke-linejoin:round; }
      .bond   { stroke:#E8FFF4; stroke-width:3.2; opacity:0.55; stroke-linecap:round; }
      .bond2  { stroke:#D7FFF0; stroke-width:2.6; opacity:0.45; stroke-linecap:round; }
      .na     { fill:#E6FF7A; stroke:#06323A; stroke-width:2.2; }
      .cl     { fill:#7DEBFF; stroke:#06323A; stroke-width:2.2; }
      text { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <!-- Big S -->
    <path d="M356 114
             C334 88 300 72 260 72
             C199 72 156 104 156 152
             C156 190 181 210 232 223
             L260 230
             C304 241 322 255 322 282
             C322 314 292 336 248 336
             C208 336 176 322 150 296
             L118 328
             C150 364 195 384 248 384
             C318 384 370 344 370 280
             C370 230 336 204 274 188
             L244 181
             C204 171 190 160 190 144
             C190 122 215 104 254 104
             C284 104 310 116 330 138
             L356 114Z" fill="url(#Sgrad)"></path>

    <!-- Falling crystals -->
    <g>
      <rect x="168" y="250" width="18" height="18" rx="3" transform="rotate(18 168 250)" fill="#39BDFE" class="thin"></rect>
      <rect x="192" y="270" width="20" height="20" rx="3" transform="rotate(-12 192 270)" fill="#4FD0FF" class="thin"></rect>
      <rect x="214" y="294" width="16" height="16" rx="3" transform="rotate(20 214 294)" fill="#2FA8F5" class="thin"></rect>
    </g>

    <!-- Triangle salt pile (simple) -->
    <g id="pile">
      <path class="stroke" d="M120 452 L256 310 L392 452 Z" fill="url(#pileMain)"></path>
      <path class="stroke2" opacity="0.92" d="M168 452 L256 348 L344 452 Z" fill="url(#pileInner)"></path>
    </g>

    <!-- NaCl cube -->
    <g id="cube">
      <path class="stroke" fill="url(#cubeTop)" d="M362 280 L456 324 L362 368 L268 324 L362 280Z"></path>
      <path class="stroke" fill="url(#cubeLeft)" d="M268 324 L362 368 V472 L268 428 V324Z"></path>
      <path class="stroke" fill="url(#cubeRight)" d="M456 324 L362 368 V472 L456 428 V324Z"></path>

      <path d="M362 368L362 472" class="stroke2" opacity="0.28"></path>
      <path d="M268 324L362 368L456 324" class="stroke2" opacity="0.20"></path>

      <!-- lattice left -->
      <g clip-path="url(#clipLeft)">
        <path class="bond2" d="M286 364L310 376L334 388L358 400"></path>
        <path class="bond2" d="M286 392L310 404L334 416L358 428"></path>
        <path class="bond2" d="M286 420L310 432L334 444L358 456"></path>
        <path class="bond" d="M292 360L292 458"></path>
        <path class="bond" d="M316 372L316 470"></path>
        <path class="bond" d="M340 384L340 482"></path>

        <circle class="na" cx="292" cy="378" r="6.2"></circle>
        <circle class="cl" cx="316" cy="390" r="6.2"></circle>
        <circle class="na" cx="340" cy="402" r="6.2"></circle>
        <circle class="cl" cx="292" cy="406" r="6.2"></circle>
        <circle class="na" cx="316" cy="418" r="6.2"></circle>
        <circle class="cl" cx="340" cy="430" r="6.2"></circle>
        <circle class="na" cx="292" cy="434" r="6.2"></circle>
        <circle class="cl" cx="316" cy="446" r="6.2"></circle>
        <circle class="na" cx="340" cy="458" r="6.2"></circle>
      </g>

      <!-- lattice right -->
      <g clip-path="url(#clipRight)">
        <path class="bond2" d="M438 364L414 376L390 388L366 400"></path>
        <path class="bond2" d="M438 392L414 404L390 416L366 428"></path>
        <path class="bond2" d="M438 420L414 432L390 444L366 456"></path>
        <path class="bond" d="M432 360L432 458"></path>
        <path class="bond" d="M408 372L408 470"></path>
        <path class="bond" d="M384 384L384 482"></path>

        <circle class="cl" cx="432" cy="378" r="6.2"></circle>
        <circle class="na" cx="408" cy="390" r="6.2"></circle>
        <circle class="cl" cx="384" cy="402" r="6.2"></circle>
        <circle class="na" cx="432" cy="406" r="6.2"></circle>
        <circle class="cl" cx="408" cy="418" r="6.2"></circle>
        <circle class="na" cx="384" cy="430" r="6.2"></circle>
        <circle class="cl" cx="432" cy="434" r="6.2"></circle>
        <circle class="na" cx="408" cy="446" r="6.2"></circle>
        <circle class="cl" cx="384" cy="458" r="6.2"></circle>
      </g>

      <g opacity="0.92" fill="#F0FFF4">
        <text x="286" y="358" font-size="22" font-weight="900">Na</text>
        <text x="414" y="358" font-size="22" font-weight="900">Cl</text>
      </g>
    </g>
  </g>
</svg>
