name: Build Jekyll site

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --trace
        env:
          JEKYLL_ENV: production

      # Soft link check: reports broken links/anchors but never fails the job.
      # Skip-link anchors (#main, #site-nav, #footer) are theme-level pseudo-anchors
      # that the checker mis-flags — they're safe to ignore.
      - name: Check for broken internal links
        uses: untitaker/hyperlink@0.1.44
        with:
          args: >-
            _site/
            --check-anchors
            --sources _site/
        continue-on-error: true
